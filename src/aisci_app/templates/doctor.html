<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Doctor - AiScientist</title>
    <style>
      body {
        margin: 0;
        padding: 28px;
        color: #e8eefc;
        background: linear-gradient(180deg, #090d18, #050812 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .shell { max-width: 1100px; margin: 0 auto; }
      .panel {
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(18, 24, 43, 0.92);
      }
      h1 { margin-top: 0; }
      .muted { color: #99a3bd; }
      ul { list-style: none; padding: 0; display: grid; gap: 10px; }
      li {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
      }
      .status-ok { color: #34d399; }
      .status-warn { color: #f59e0b; }
      .status-fail { color: #fb7185; }
      .top { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
      a { color: #7dd3fc; }
    </style>
  </head>
  <body>
    <div class="shell panel">
      <p><a href="/">Back to console</a></p>
      <h1>Paper Doctor</h1>
      <p class="muted">Environment readiness checks for paper jobs.</p>
      <ul>
        {% for check in report %}
        <li>
          <div class="top">
            <strong>{{ check.name }}</strong>
            <span class="status-{{ check.status }}">{{ check.status }}</span>
          </div>
          <div class="muted">{{ check.detail }}</div>
        </li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
